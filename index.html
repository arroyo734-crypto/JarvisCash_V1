 <!DOCTYPE html>
  <html lang="en">
  <meta name="google-site-verification" content="_7Kr-rF1HdYRT4WnrJyFCjI-FQu53KlEKkD_HjtAaVw" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis Cash 2.0</title>
    <style>
      body {
        background: #fff;
        color: #000;
        font-family: Arial, sans-serif;
        text-align: center;
        padding-top: 40px;
        margin: 0;
      }
      a { text-decoration: none; color: inherit; }
      .header { border-bottom: 2px solid #000; padding-bottom: 20px; margin-bottom:
  20px; }
      h1 { margin: 0; font-size: 2.5rem; }
      .description { margin-top: 10px; font-size: 1.2rem; max-width: 800px; margin-left:
   auto; margin-right: auto; }
      .btn { font-size: 80px; background: none; border: none; cursor: pointer; display:
  block; margin: 20px auto; }
      .rev-text { font-size: 32px; font-weight: bold; margin-top: 20px; color: #000;
  border: 2px solid #000; display: inline-block; padding: 10px; border-radius: 10px; }
      .crown { color: gold; font-size: 24px; margin-top: 60px; border: 2px solid gold;
  padding: 15px; display: inline-block; border-radius: 10px; cursor: pointer; }
      .tabs { margin: 40px auto; max-width: 600px; display: flex; justify-content:
  space-around; }
      .tab { padding: 10px 20px; border: 2px solid #000; border-radius: 5px; position:
  relative; cursor: pointer; }
      .tab::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 100%;
   height: 2px; background: lime; display: none; }
      .tab.active::after { display: block; }
      .cursor { width: 10px; height: 24px; background: lime; display: inline-block;
  vertical-align: middle; margin-left: 4px; }
      .footer { margin-top: 60px; font-size: 0.9rem; }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>Jarvis Cash 2.0</h1>
      <div class="description">
        <p>Jarvis Cash 2.0 is a lightweight web-app that lets you connect a crypto
  wallet and track revenue in real time.</p>
      </div>
    </div>
    <button class="btn" onclick="addRev()">➕</button>
    <div id="counter" class="rev-text">CASH: $0</div>
    <div class="tabs">
      <div class="tab active">Home<div class="cursor"></div></div>
      <div class="tab">Docs<div class="cursor"></div></div>
      <div class="tab">Support<div class="cursor"></div></div>
    </div>
    <br>
    <div class="crown" onclick="connectWallet()">👑 CONNECT CRYPTO WALLET</div>
    <div class="footer">
      <a href="privacy.html">Privacy Policy</a> | <a href="terms.html">Terms of
  Service</a>
    </div>
    <script>
      let total = parseFloat(localStorage.getItem('rev')) || 0;
      document.getElementById('counter').innerText = 'CASH: $' + total;
      function addRev() {
        total = parseFloat(total) + 10;
        localStorage.setItem('rev', total);
        document.getElementById('counter').innerText = 'CASH: $' + total;
      }
      async function connectWallet() {
        if (window.ethereum) {
          try {
            const accounts = await window.ethereum.request({ method:
  'eth_requestAccounts' });
            alert("Wallet Linked: " + accounts[0].substring(0,6) + "...");
            document.querySelector('.crown').innerText = "💎 WALLET ACTIVE";
          } catch (e) { alert("Connection Denied"); }
        } else { alert("MetaMask not found! Open this in your Wallet Browser."); }
      }
    </script>
  </body>
  </html>
